<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站图片上传器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主容器 -->
    <div id="app">
        <!-- 导航栏（登录后显示） -->
        <nav id="main-nav" class="hidden">
            <div class="nav-container">
                <h1 class="app-title">B站图片上传器</h1>
                <div class="nav-buttons">
                    <button class="nav-btn active" data-page="upload">上传</button>
                    <button class="nav-btn" data-page="history">历史</button>
                    <button class="nav-btn" data-page="check">检查</button>
                    <button class="nav-btn" data-page="config">配置</button>
                    <button class="nav-btn logout-btn">退出</button>
                </div>
            </div>
        </nav>

        <!-- 页面容器 -->
        <main id="pages-container">
            <!-- 登录页 -->
            <section id="page-login" class="page active">
                <div class="login-container">
                    <h2 class="login-title">访问令牌</h2>
                    <form id="login-form" class="login-form">
                        <input type="password" id="token-input" class="p5-input login-input" placeholder="请输入Token" maxlength="32" autocomplete="off">
                        <button type="submit" class="p5-button p5-button-primary login-button">
                    <svg class="button-svg" viewBox="0 0 100 50" preserveAspectRatio="none">
                        <polygon class="red" points="10,20 80,20 80,30, 20,30"></polygon>
                        <polygon class="blue" points="30,10 90,30 100,35, 20,50"></polygon>
                    </svg>
                    进入
                </button>
                    </form>
                    <div id="login-error" class="login-error hidden"></div>
                </div>
            </section>

            <!-- 上传页 -->
            <section id="page-upload" class="page hidden">
                <div class="upload-container">
                    <div class="upload-area">
                        <input type="file" id="file-input" class="hidden" multiple accept="image/*">
                        <div class="upload-zone" id="upload-zone">
                            <h3 class="upload-title">选择图片</h3>
                            <p class="upload-hint">点击或拖拽图片到此处</p>
                        </div>
                    </div>
                    <div class="upload-queue">
                        <h3 class="queue-title">上传队列</h3>
                        <div id="queue-list" class="queue-list"></div>
                        <button id="start-upload" class="p5-button p5-button-primary upload-btn">
                        <svg class="button-svg" viewBox="0 0 100 50" preserveAspectRatio="none">
                            <polygon class="red" points="10,20 80,20 80,30, 20,30"></polygon>
                            <polygon class="blue" points="30,10 90,30 100,35, 20,50"></polygon>
                        </svg>
                        开始上传
                    </button>
                    </div>
                </div>
            </section>

            <!-- 历史页 -->
            <section id="page-history" class="page hidden">
                <div class="history-container">
                    <h2 class="page-title">上传历史</h2>
                    <div class="table-container">
                        <table class="p5-table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>文件名</th>
                                    <th>大小</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 检查页 -->
            <section id="page-check" class="page hidden">
                <div class="check-container">
                    <h2 class="page-title">失效检查</h2>
                    <div class="check-actions">
                        <button id="start-check" class="p5-button p5-button-primary">
                        <svg class="button-svg" viewBox="0 0 100 50" preserveAspectRatio="none">
                            <polygon class="red" points="10,20 80,20 80,30, 20,30"></polygon>
                            <polygon class="blue" points="30,10 90,30 100,35, 20,50"></polygon>
                        </svg>
                        开始检查
                    </button>
                    </div>
                    <div class="check-progress hidden" id="check-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" id="check-progress-fill"></div>
                        </div>
                        <span class="progress-text" id="check-progress-text">0%</span>
                    </div>
                    <div class="table-container">
                        <table class="p5-table">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>文件名</th>
                                    <th>图片URL</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="check-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- 配置页 -->
            <section id="page-config" class="page hidden">
                <div class="config-container">
                    <h2 class="page-title">系统配置</h2>
                    <form id="config-form" class="config-form">
                        <div class="form-group">
                            <label class="p5-label">B站 CSRF Token</label>
                            <input type="text" id="config-csrf" class="p5-input" placeholder="请输入biliCsrf">
                        </div>
                        <div class="form-group">
                            <label class="p5-label">B站 Session Data</label>
                            <input type="text" id="config-sessdata" class="p5-input" placeholder="请输入biliSessdata">
                        </div>
                        <div class="form-group">
                            <label class="p5-label">B站 OID</label>
                            <input type="text" id="config-oid" class="p5-input" placeholder="请输入biliOid">
                        </div>
                        <div class="form-group">
                            <label class="p5-label">访问令牌</label>
                            <input type="text" id="config-token" class="p5-input" placeholder="请输入Token" maxlength="32">
                        </div>
                        <button type="submit" class="p5-button p5-button-primary">
                        <svg class="button-svg" viewBox="0 0 100 50" preserveAspectRatio="none">
                            <polygon class="red" points="10,20 80,20 80,30, 20,30"></polygon>
                            <polygon class="blue" points="30,10 90,30 100,35, 20,50"></polygon>
                        </svg>
                        保存配置
                    </button>
                    </form>
                </div>
            </section>
        </main>

        <!-- 通知提示 -->
        <div id="toast" class="p5-toast hidden"></div>
    </div>

    <script src="js/snap.svg-min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
